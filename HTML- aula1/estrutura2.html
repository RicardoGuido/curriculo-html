<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula01 - HTML semântico</title>
</head>

<body>
    <header>
        <!--Cabeçalho, logotipo, nome do site, slogan-->
    </header>

    <nav>
        <!--Menu de navegação principal-->
    </nav>
    <!--Conteúdo principal e único da página (tag main)-->
    <main>
        <section>
            <!--Criar seções na página-->
        </section>

        <article>
            <!--Conteúdo independente: posts, notícias, cards de produtos, propaganda-->
        </article>

        <aside>
            <!--Conteúdo relacionado porém secundário: dica, banner, links relacionados-->
        </aside>
    </main>

    <footer>
        <!--Rodapé da página: Copyright, redes sociais, links-->
    </footer>


    <!--Apenas um H por página-->

    <h1>Hello World</h1>
    <h2>Hello World</h2>
    <h3>Hello World</h3>
    <h4>Hello World</h4>
    <h5>Hello World</h5>
    <h6>Hello World</h6>
</body>

</html>
